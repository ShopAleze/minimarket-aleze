<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopAleze - Control de Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        .modal {
            transition: opacity 0.25s ease;
        }
        body.modal-active {
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

    <div class="flex flex-col md:flex-row min-h-screen">
        
        <div class="w-full md:w-64 bg-gray-900 text-white p-6 shadow-xl">
            <div class="flex items-center space-x-3 mb-8">
                <i class="fas fa-boxes text-blue-500 text-2xl"></i>
                <span class="text-2xl font-bold tracking-wider">ShopAleze</span>
            </div>
            <nav class="space-y-2">
                <a href="#" class="flex items-center space-x-3 p-3 bg-blue-600 rounded-lg text-white font-medium">
                    <i class="fas fa-chart-line w-6"></i>
                    <span>Panel Principal</span>
                </a>
            </nav>
        </div>

        <main class="flex-1 p-6 md:p-10">
            <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-xl shadow-sm">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800">Sistema de Inventario y Ventas</h1>
                    <p class="text-gray-500 mt-1">Gestión automatizada con soporte de códigos de barras</p>
                </div>
                <div class="text-sm text-gray-500 bg-gray-100 px-4 py-2 rounded-lg font-mono">
                    v2.1 - Cloud
                </div>
            </header>

            <div id="barcode-container" class="hidden bg-white p-6 rounded-xl shadow-md max-w-sm mx-auto mb-6 text-center border-2 border-dashed border-gray-300">
                <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-2">Vista Previa de Etiqueta</h3>
                <span id="barcode-prod-nombre-label" class="block font-bold text-gray-700 text-lg mb-2"></span>
                <div class="flex justify-center bg-gray-50 p-4 rounded-lg">
                    <svg id="barcode-preview"></svg>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm min-h-[400px]">
                <p class="text-gray-600">Cargando módulos del sistema...</p>
            </div>
        </main>
    </div>

    <div id="modal-cat-rapida" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-gray-900 opacity-50"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded shadow-lg z-50 overflow-y-auto">
            <div class="modal-content py-4 text-left px-6">
                <div class="flex justify-between items-center pb-3">
                    <p class="text-2xl font-bold text-gray-800">Agregar Categoría Rápida</p>
                    <div class="modal-close cursor-pointer z-50" onclick="cerrarModal('modal-cat-rapida')">
                        <i class="fas fa-times text-gray-500 hover:text-gray-700"></i>
                    </div>
                </div>
                <div class="my-5">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Nombre de Categoría:</label>
                    <input id="catr-nombre" type="text" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline mb-4">
                    
                    <label class="block text-gray-700 text-sm font-bold mb-2">Emoji / Ícono:</label>
                    <input id="catr-emoji" type="text" placeholder="📦" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline mb-4">
                    
                    <label class="block text-gray-700 text-sm font-bold mb-2">Margen de Ganancia (%):</label>
                    <input id="catr-margen" type="number" value="0" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                </div>
                <div class="flex justify-end pt-2 space-x-2">
                    <button class="px-4 bg-gray-200 p-3 rounded-lg text-gray-800 hover:bg-gray-300 transition duration-150" onclick="cerrarModal('modal-cat-rapida')">Cancelar</button>
                    <button class="px-4 bg-blue-500 p-3 rounded-lg text-white hover:bg-blue-600 transition duration-150" onclick="guardarCatRapida()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DB = {
            categorias: [],
            productos: []
        };
        let editingProductId = null;

        function getId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }

        function abrirModal(id) {
            const modal = document.getElementById(id);
            modal.classList.remove('opacity-0', 'pointer-events-none');
            document.body.classList.add('modal-active');
        }

        function cerrarModal(id) {
            const modal = document.getElementById(id);
            modal.classList.add('opacity-0', 'pointer-events-none');
            document.body.classList.remove('modal-active');
        }

        function abrirCatRapida() {
            document.getElementById('catr-nombre').value = "";
            document.getElementById('catr-emoji').value = "";
            document.getElementById('catr-margen').value = "0";
            abrirModal('modal-cat-rapida');
        }

        function guardarCatRapida() {
            const nombre = document.getElementById('catr-nombre').value.trim();
            if (!nombre) {
                alert('Ingresa un nombre para la categoría');
                return;
            }

            const nueva = {
                id: getId(),
                nombre: nombre,
                emoji: document.getElementById('catr-emoji').value || '📦',
                margen: parseFloat(document.getElementById('catr-margen').value) || 0
            };

            DB.categorias.push(nueva);
            updateModalCats();
            
            const prodCatSelect = document.getElementById('prod-cat');
            if (prodCatSelect) {
                prodCatSelect.value = nueva.id;
            }
            
            if (typeof actualizarPrecioSugerido === "function") {
                actualizarPrecioSugerido();
            }
            
            cerrarModal('modal-cat-rapida');
            console.log("Categoría guardada con éxito:", nueva);
        }

        function updateModalCats() {
            const select = document.getElementById('prod-cat');
            if (!select) return;
            select.innerHTML = '<option value="">Seleccione una categoría</option>';
            DB.categorias.forEach(cat => {
                select.innerHTML += `<option value="${cat.id}">${cat.emoji} ${cat.nombre}</option>`;
            });
        }

        function verCodigoBarras(id) {
            const p = DB.productos.find(x => x.id === id);
            if (!p) {
                console.warn("Producto no encontrado, usando datos de prueba dinámicos.");
                editingProductId = id;
                document.getElementById('barcode-prod-nombre-label').textContent = "Producto de Ejemplo";
                document.getElementById('barcode-container').style.display = 'block';
                JsBarcode('#barcode-preview', id, {
                    width: 2,
                    height: 55,
                    fontSize: 12,
                    displayValue: true
                });
                return;
            }

            editingProductId = id;
            const inputCodigo = document.getElementById('prod-codigo');
            if (inputCodigo) inputCodigo.value = p.codigo;
            
            document.getElementById('barcode-prod-nombre-label').textContent = p.nombre;
            document.getElementById('barcode-container').style.display = 'block';
            
            JsBarcode('#barcode-preview', p.codigo, { 
                width: 2, 
                height: 55, 
                fontSize: 12, 
                displayValue: true 
            });
        }

        function imprimirEtiquetaHTML(htmlCompleto) {
            const win = window.open("", "_blank", "width=655,height=520");
            if (!win) {
                alert('Bloqueador de popups activo. Permite ventanas emergentes para imprimir etiquetas.');
                return;
            }
            win.document.open();
            win.document.write(htmlCompleto);
            win.document.close();
            win.onload = function() {
                win.focus();
            };
        }

        console.log("Sistema Aleze inicializado correctamente.");
    </script>
</body>
</html>
